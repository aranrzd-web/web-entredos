<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entre Dos Studio · Your Film</title>
  <link rel="icon" type="image/jpeg" href="logowebbo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'The Seasons';
      src: url('THESEASONS-LT.OTF') format('opentype');
      font-weight: 300; font-style: normal;
    }
    @font-face {
      font-family: 'The Seasons';
      src: url('THESEASONS-REG.OTF') format('opentype');
      font-weight: 400; font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #ece6de;
      color: #231200;
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
    }

    /* ── LOCK SCREEN ── */
    #lockScreen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadeIn 1s ease forwards;
    }
    .lock-logo {
      width: 120px;
      margin-bottom: 3rem;
      opacity: 0.85;
    }
    .lock-title {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #231200;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .lock-subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.05rem;
      font-style: italic;
      color: rgba(35,18,0,0.55);
      margin-bottom: 3rem;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .lock-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: 100%;
      max-width: 340px;
    }
    .input-wrap {
      width: 100%;
      position: relative;
    }
    .lock-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(35,18,0,0.25);
      color: #231200;
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 0.95rem;
      padding: 12px 0;
      outline: none;
      letter-spacing: 0.1em;
      text-align: center;
      transition: border-color 0.3s ease;
    }
    .lock-input::placeholder {
      color: rgba(35,18,0,0.3);
      letter-spacing: 0.2em;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .lock-input:focus { border-bottom-color: rgba(35,18,0,0.7); }
    .lock-btn {
      background: none;
      border: 1px solid rgba(35,18,0,0.3);
      color: rgba(35,18,0,0.8);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 14px 48px;
      cursor: pointer;
      transition: all 0.35s ease;
      margin-top: 0.5rem;
    }
    .lock-btn:hover {
      border-color: rgba(35,18,0,0.8);
      color: #231200;
      background: rgba(35,18,0,0.04);
    }
    .error-msg {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      font-style: italic;
      color: rgba(35,18,0,0.5);
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.4s ease;
      min-height: 1.4rem;
    }
    .error-msg.visible { opacity: 1; }

    .lock-divider {
      width: 30px;
      height: 1px;
      background: rgba(35,18,0,0.15);
      margin: 2rem auto 0;
    }

    /* ── VIDEO SCREEN ── */
    #videoScreen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }
    #videoScreen.visible {
      display: flex;
      animation: fadeIn 1.2s ease forwards;
    }
    .video-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .video-logo {
      width: 160px;
      margin-bottom: 2rem;
      opacity: 0.85;
    }
    .video-title {
      font-family: 'The Seasons', 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #231200;
      margin-bottom: 0.5rem;
    }
    .video-subtitle {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.05rem;
      font-style: italic;
      color: rgba(35,18,0,0.5);
      letter-spacing: 0.03em;
    }
    .video-wrap {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      box-shadow: 0 20px 80px rgba(35,18,0,0.12);
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .video-footer {
      margin-top: 3rem;
      text-align: center;
    }
    .video-footer p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 0.95rem;
      font-style: italic;
      color: rgba(35,18,0,0.4);
      letter-spacing: 0.03em;
    }
    .download-btn {
      display: inline-block;
      margin-top: 1.5rem;
      background: none;
      border: 1px solid rgba(35,18,0,0.3);
      color: rgba(35,18,0,0.8) !important;
      font-family: 'Raleway', sans-serif !important;
      font-size: 0.7rem !important;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 14px 40px;
      text-decoration: none !important;
      border-bottom: 1px solid rgba(35,18,0,0.3) !important;
      transition: all 0.35s ease;
    }
    .download-btn:hover {
      border-color: rgba(35,18,0,0.8) !important;
      color: #231200 !important;
      background: rgba(35,18,0,0.04);
    }
      color: rgba(35,18,0,0.5);
      text-decoration: none;
      border-bottom: 1px solid rgba(35,18,0,0.2);
      transition: all 0.3s ease;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: inline-block;
      margin-top: 1rem;
    }
    .video-footer a:hover {
      color: #231200;
      border-bottom-color: rgba(35,18,0,0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <img src="logowebbo.jpg" alt="Entre Dos Studio" class="lock-logo" />
    <h1 class="lock-title">Your film is ready</h1>
    <p class="lock-subtitle">Enter your private access code to watch</p>

    <form class="lock-form" onsubmit="checkPassword(event)">
      <div class="input-wrap">
        <input
          type="password"
          id="passwordInput"
          class="lock-input"
          placeholder="Access code"
          autocomplete="off"
          autofocus
        />
      </div>
      <p class="error-msg" id="errorMsg">Incorrect code — please try again</p>
      <button type="submit" class="lock-btn">Watch the film</button>
    </form>

    <div class="lock-divider"></div>
  </div>

  <!-- VIDEO SCREEN -->
  <div id="videoScreen">
    <div class="video-header">
      <img src="logowebbo.jpg" alt="Entre Dos Studio" class="video-logo" />
      <h1 class="video-title">Clàudia & Víctor</h1>
      <p class="video-subtitle">Wedding Film · 2026</p>
    </div>

    <div class="video-wrap">
      <!-- 🎬 SUBSTITUEIX L'src PER LA URL DEL TEU GOOGLE DRIVE -->
      <!-- Format: https://drive.google.com/file/d/ID_DEL_VIDEO/preview -->
      <iframe
        id="videoFrame"
        src="https://drive.google.com/file/d/1XOxHtSyn4h17W0N4kD5NsQn4UJ_bOfSK/preview"
        allow="autoplay"
        allowfullscreen>
      </iframe>
    </div>

    <div class="video-footer">
      <p>With love, Entre Dos Studio</p>
      <a href="https://drive.google.com/uc?export=download&id=1XOxHtSyn4h17W0N4kD5NsQn4UJ_bOfSK" target="_blank" class="download-btn">↓ Download your film</a>
      <br>
      <a href="index.html">← Back to website</a>
    </div>
  </div>

  <script>
    // ============================================================
    //  CONFIGURACIÓ — canvia aquí la contrasenya i el vídeo
    // ============================================================
    const PASSWORD = 'claudiavictor';
    // Per canviar el vídeo, substitueix l'src de l'iframe de dalt
    // Format Google Drive: https://drive.google.com/file/d/ID/preview
    // ============================================================

    function checkPassword(e) {
      e.preventDefault();
      const input = document.getElementById('passwordInput').value.trim().toLowerCase();
      const errorMsg = document.getElementById('errorMsg');

      if (input === PASSWORD.toLowerCase()) {
        // Correcte — mostra el vídeo
        document.getElementById('lockScreen').style.animation = 'none';
        document.getElementById('lockScreen').style.opacity = '0';
        document.getElementById('lockScreen').style.transition = 'opacity 0.6s ease';
        setTimeout(() => {
          document.getElementById('lockScreen').style.display = 'none';
          document.getElementById('videoScreen').classList.add('visible');
        }, 600);
      } else {
        // Incorrecte — mostra error i sacseja l'input
        errorMsg.classList.add('visible');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').style.borderBottomColor = 'rgba(35,18,0,0.5)';
        setTimeout(() => {
          errorMsg.classList.remove('visible');
          document.getElementById('passwordInput').style.borderBottomColor = '';
        }, 3000);
      }
    }
  </script>

</body>
</html>
